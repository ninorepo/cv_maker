<svg xmlns="http://www.w3.org/2000/svg"
     width="210mm" height="297mm"
     viewBox="0 0 1000 1414">

  <!-- Top -->
  <text x="500" y="300"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="30"
        font-family="Arial"
        font-weight="bold"
        fill="black"
        fill-opacity="0.8"
        transform="rotate(-45 500 300)">
    {{text}}
  </text>

  <!-- Middle -->
  <text x="500" y="700"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="30"
        font-family="Arial"
        font-weight="bold"
        fill="black"
        fill-opacity="0.8"
        transform="rotate(-45 500 700)">
    {{text}}
  </text>

  <!-- Bottom -->
  <text x="500" y="1100"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="30"
        font-family="Arial"
        font-weight="bold"
        fill="black"
        fill-opacity="0.8"
        transform="rotate(-45 500 1100)">
    {{text}}
  </text>

</svg>
